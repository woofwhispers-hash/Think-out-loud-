<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Think Out Loud</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --ink:#1c1917;
  --ink2:#57534e;
  --ink3:#a8a29e;
  --paper:#faf9f7;
  --paper2:#f5f3ef;
  --paper3:#ede9e3;
  --accent:#c2410c;
  --accent-soft:#fff7ed;
  --border:rgba(28,25,23,0.1);
  --border2:rgba(28,25,23,0.18);
  --gold:#b45309;
}

html,body{height:100%;background:var(--paper2);}

body{
  font-family:'Lora',Georgia,serif;
  color:var(--ink);
  display:flex;
  flex-direction:column;
  min-height:100svh;
}

/* grain overlay */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:9999;opacity:0.6;
}

/* NAV */
nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:1.1rem 2rem;
  border-bottom:1px solid var(--border);
  background:var(--paper);
  position:sticky;top:0;z-index:100;
}
.logo{
  font-family:'Lora',serif;font-size:1.1rem;font-weight:500;letter-spacing:0.01em;
  color:var(--ink);display:flex;align-items:center;gap:8px;
}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);display:inline-block;}
.nav-tabs{display:flex;gap:2px;background:var(--paper3);border-radius:8px;padding:3px;}
.nav-tab{
  padding:6px 16px;border-radius:6px;font-size:0.8rem;letter-spacing:0.04em;
  font-family:'DM Mono',monospace;font-weight:400;
  border:none;cursor:pointer;background:none;color:var(--ink3);transition:all 0.18s;
}
.nav-tab.active{background:var(--paper);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,0.08);}
.entry-count{
  font-family:'DM Mono',monospace;font-size:0.75rem;color:var(--ink3);
  background:var(--paper3);padding:4px 12px;border-radius:20px;
}

/* PAGES */
.page{display:none;flex:1;animation:fadeIn 0.25s ease;}
.page.active{display:flex;flex-direction:column;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

/* WRITE PAGE */
.write-layout{
  max-width:680px;width:100%;margin:0 auto;
  padding:3rem 2rem 6rem;
  display:flex;flex-direction:column;gap:1.5rem;
  flex:1;
}
.date-stamp{
  font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--ink3);
  letter-spacing:0.08em;text-transform:uppercase;
}
.entry-title-input{
  font-family:'Lora',serif;font-size:1.6rem;font-weight:500;
  border:none;background:transparent;color:var(--ink);
  width:100%;outline:none;line-height:1.3;
  resize:none;overflow:hidden;min-height:1.3em;
}
.entry-title-input::placeholder{color:var(--ink3);}
.divider{height:1px;background:var(--border);margin:0;}
.entry-body{
  font-family:'Lora',serif;font-size:1.05rem;line-height:1.85;
  color:var(--ink);background:transparent;border:none;outline:none;
  width:100%;resize:none;min-height:320px;
  caret-color:var(--accent);
}
.entry-body::placeholder{color:var(--ink3);font-style:italic;}
.write-footer{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:1rem 2rem;background:var(--paper);
  border-top:1px solid var(--border);
}
.word-count{font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--ink3);}
.save-btn{
  display:flex;align-items:center;gap:7px;
  background:var(--ink);color:var(--paper);
  border:none;border-radius:24px;padding:9px 22px;
  font-family:'DM Mono',monospace;font-size:0.8rem;cursor:pointer;
  transition:opacity 0.15s;letter-spacing:0.03em;
}
.save-btn:hover{opacity:0.82;}
.save-btn.saved{background:var(--paper3);color:var(--ink2);}

/* ENTRIES PAGE */
.entries-layout{
  max-width:720px;width:100%;margin:0 auto;
  padding:2.5rem 2rem 4rem;
  display:flex;flex-direction:column;gap:0;
  flex:1;
}
.entries-header{
  display:flex;align-items:baseline;justify-content:space-between;
  margin-bottom:2rem;
}
.entries-title{font-size:1.3rem;font-weight:500;}
.entries-sub{font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--ink3);}

.entry-card{
  padding:1.4rem 0;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background 0.12s;
  display:grid;grid-template-columns:1fr auto;gap:1rem;align-items:start;
}
.entry-card:hover .entry-card-title{color:var(--accent);}
.entry-card-title{font-size:1.05rem;font-weight:500;margin-bottom:0.35rem;transition:color 0.15s;line-height:1.4;}
.entry-card-preview{font-size:0.88rem;color:var(--ink3);line-height:1.6;font-style:italic;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.entry-card-meta{
  font-family:'DM Mono',monospace;font-size:0.68rem;color:var(--ink3);
  text-align:right;white-space:nowrap;margin-top:3px;
}
.entry-card-words{
  display:inline-block;margin-top:4px;
  background:var(--paper3);border-radius:10px;padding:2px 8px;
  font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--ink3);
}

.empty-journal{
  text-align:center;padding:5rem 2rem;color:var(--ink3);
}
.empty-journal-glyph{font-size:2.5rem;margin-bottom:1rem;opacity:0.3;}
.empty-journal p{font-style:italic;font-size:0.95rem;}

/* MODAL (entry detail) */
.modal-bg{
  position:fixed;inset:0;background:rgba(28,25,23,0.45);
  z-index:500;display:flex;align-items:center;justify-content:center;
  padding:1rem;animation:fadeIn 0.2s;
}
.modal-box{
  background:var(--paper);border-radius:12px;
  max-width:620px;width:100%;max-height:85svh;
  overflow-y:auto;padding:2rem;position:relative;
  box-shadow:0 8px 40px rgba(0,0,0,0.18);
}
.modal-close{
  position:absolute;top:1rem;right:1rem;
  background:var(--paper3);border:none;border-radius:50%;
  width:30px;height:30px;cursor:pointer;font-size:1rem;color:var(--ink2);
  display:flex;align-items:center;justify-content:center;
}
.modal-date{font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--ink3);margin-bottom:0.75rem;text-transform:uppercase;letter-spacing:0.07em;}
.modal-title{font-size:1.4rem;font-weight:500;margin-bottom:1rem;line-height:1.3;}
.modal-body{font-size:0.97rem;line-height:1.9;color:var(--ink2);white-space:pre-wrap;}
.modal-del{
  margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border);
  display:flex;justify-content:flex-end;
}
.del-btn{
  background:none;border:1px solid #fca5a5;color:#b91c1c;
  border-radius:6px;padding:6px 14px;font-size:0.78rem;cursor:pointer;
  font-family:'DM Mono',monospace;transition:all 0.15s;
}
.del-btn:hover{background:#fef2f2;}

/* INSIGHTS PAGE */
.insights-layout{
  max-width:720px;width:100%;margin:0 auto;
  padding:2.5rem 2rem 4rem;
  display:flex;flex-direction:column;gap:1.5rem;
  flex:1;
}
.insights-header{margin-bottom:0.5rem;}
.insights-title{font-size:1.3rem;font-weight:500;margin-bottom:0.35rem;}
.insights-sub{font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--ink3);}

.insight-trigger{
  display:flex;align-items:center;gap:12px;
  background:var(--accent-soft);border:1px solid #fed7aa;
  border-radius:10px;padding:1.1rem 1.4rem;cursor:pointer;
  transition:all 0.15s;
}
.insight-trigger:hover{background:#fff0e0;}
.insight-trigger-icon{font-size:1.4rem;}
.insight-trigger-text{flex:1;}
.insight-trigger-label{font-size:0.95rem;font-weight:500;color:var(--accent);margin-bottom:2px;}
.insight-trigger-sub{font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--gold);}
.insight-btn{
  background:var(--accent);color:#fff;border:none;
  border-radius:8px;padding:8px 16px;font-family:'DM Mono',monospace;
  font-size:0.75rem;cursor:pointer;white-space:nowrap;transition:opacity 0.15s;
}
.insight-btn:hover{opacity:0.85;}
.insight-btn:disabled{opacity:0.5;cursor:default;}

.insight-result{
  background:var(--paper);border:1px solid var(--border);
  border-radius:12px;padding:1.5rem;
  animation:fadeIn 0.3s;
}
.insight-result-header{
  display:flex;align-items:center;gap:8px;margin-bottom:1rem;
  font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--ink3);text-transform:uppercase;letter-spacing:0.08em;
}
.insight-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);}
.insight-text{font-size:0.97rem;line-height:1.85;color:var(--ink);white-space:pre-wrap;}
.insight-text strong{color:var(--accent);font-weight:500;}

.loading-dots{display:inline-flex;gap:4px;align-items:center;}
.loading-dots span{
  width:5px;height:5px;border-radius:50%;background:var(--ink3);
  animation:dot-bounce 1.2s infinite;display:inline-block;
}
.loading-dots span:nth-child(2){animation-delay:0.2s;}
.loading-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes dot-bounce{0%,80%,100%{transform:scale(0.6);}40%{transform:scale(1);}}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.stat-card{
  background:var(--paper);border:1px solid var(--border);
  border-radius:10px;padding:1rem 1.1rem;
}
.stat-label{font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--ink3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px;}
.stat-value{font-size:1.5rem;font-weight:500;color:var(--ink);}
.stat-unit{font-size:0.7rem;color:var(--ink3);font-family:'DM Mono',monospace;}

.mood-timeline{background:var(--paper);border:1px solid var(--border);border-radius:12px;padding:1.2rem 1.4rem;}
.mood-timeline-label{font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--ink3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:1rem;}
.mood-bars{display:flex;gap:5px;align-items:flex-end;height:60px;}
.mood-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end;}
.mood-bar{width:100%;border-radius:3px 3px 0 0;min-height:3px;}
.mood-bar-day{font-family:'DM Mono',monospace;font-size:0.58rem;color:var(--ink3);}

.no-entries-insight{
  background:var(--paper3);border-radius:10px;padding:1.5rem;
  text-align:center;font-style:italic;color:var(--ink3);font-size:0.9rem;
}
</style>
</head>
<body>

<nav>
  <div class="logo"><span class="logo-dot"></span> Think Out Loud</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('write')">Write</button>
    <button class="nav-tab" onclick="showPage('entries')">Entries</button>
    <button class="nav-tab" onclick="showPage('insights')">Insights</button>
  </div>
  <div class="entry-count" id="entry-count">0 entries</div>
</nav>

<!-- WRITE PAGE -->
<div class="page active" id="page-write">
  <div class="write-layout">
    <div class="date-stamp" id="write-date"></div>
    <textarea class="entry-title-input" id="write-title" placeholder="What's on your mind today?" rows="1" oninput="autoResize(this);markUnsaved();"></textarea>
    <div class="divider"></div>
    <textarea class="entry-body" id="write-body" placeholder="Just start writing… there's no right way to do this." oninput="updateWordCount();markUnsaved();"></textarea>
  </div>
  <div class="write-footer">
    <span class="word-count" id="word-count">0 words</span>
    <button class="save-btn" id="save-btn" onclick="saveEntry()">✦ Save entry</button>
  </div>
</div>

<!-- ENTRIES PAGE -->
<div class="page" id="page-entries">
  <div class="entries-layout">
    <div class="entries-header">
      <div>
        <div class="entries-title">Your journal</div>
        <div class="entries-sub" id="entries-sub">Start writing to see entries here</div>
      </div>
    </div>
    <div id="entries-list"></div>
  </div>
</div>

<!-- INSIGHTS PAGE -->
<div class="page" id="page-insights">
  <div class="insights-layout">
    <div class="insights-header">
      <div class="insights-title">Patterns & reflections</div>
      <div class="insights-sub">AI reads your entries and surfaces what you might not notice</div>
    </div>

    <div class="stats-row" id="stats-row"></div>

    <div class="mood-timeline" id="mood-timeline" style="display:none;">
      <div class="mood-timeline-label">Writing activity — last 7 days</div>
      <div class="mood-bars" id="mood-bars"></div>
    </div>

    <div class="insight-trigger" id="insight-trigger">
      <div class="insight-trigger-icon">✦</div>
      <div class="insight-trigger-text">
        <div class="insight-trigger-label">Reflect with AI</div>
        <div class="insight-trigger-sub" id="insight-trigger-sub">Analyse your recent entries for patterns</div>
      </div>
      <button class="insight-btn" id="insight-btn" onclick="runInsights()">Reflect →</button>
    </div>

    <div id="insight-output"></div>
  </div>
</div>

<!-- ENTRY MODAL -->
<div class="modal-bg" id="entry-modal" style="display:none;" onclick="closeModal(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="document.getElementById('entry-modal').style.display='none'">✕</button>
    <div class="modal-date" id="modal-date"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-del"><button class="del-btn" id="modal-del-btn">Delete entry</button></div>
  </div>
</div>

<script>
let entries = [];
let unsaved = false;
let currentModalId = null;

try { entries = JSON.parse(localStorage.getItem('tol_entries') || '[]'); } catch(e){}

function save() { try { localStorage.setItem('tol_entries', JSON.stringify(entries)); } catch(e){} }

// ── DATE ──────────────────────────────
const DAYS  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS= ['January','February','March','April','May','June','July','August','September','October','November','December'];
const SHORT_D = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function fmtDate(iso) {
  const d = new Date(iso+'T00:00:00');
  return `${DAYS[d.getDay()]}, ${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
}
function fmtShort(iso) {
  const d = new Date(iso+'T00:00:00');
  return `${d.getDate()} ${MONTHS[d.getMonth()].slice(0,3)}`;
}
function todayISO() { return new Date().toISOString().split('T')[0]; }
function wordCount(s) { return s.trim() ? s.trim().split(/\s+/).length : 0; }

// ── INIT ──────────────────────────────
document.getElementById('write-date').textContent = fmtDate(todayISO()).toUpperCase();
updateWordCount();
updateEntryCount();

function updateWordCount() {
  const body = document.getElementById('write-body').value;
  const title = document.getElementById('write-title').value;
  const wc = wordCount(body + ' ' + title);
  document.getElementById('word-count').textContent = wc + (wc===1?' word':' words');
}

function updateEntryCount() {
  const n = entries.length;
  document.getElementById('entry-count').textContent = n + (n===1?' entry':' entries');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function markUnsaved() {
  unsaved = true;
  const btn = document.getElementById('save-btn');
  btn.textContent = '✦ Save entry';
  btn.className = 'save-btn';
}

// ── PAGES ─────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  event.currentTarget.classList.add('active');
  if (name==='entries') renderEntries();
  if (name==='insights') renderInsights();
}

// ── SAVE ──────────────────────────────
function saveEntry() {
  const title = document.getElementById('write-title').value.trim();
  const body  = document.getElementById('write-body').value.trim();
  if (!title && !body) return;

  const today = todayISO();
  const existing = entries.findIndex(e=>e.date===today);
  const entry = { id: existing>=0 ? entries[existing].id : Date.now(), date: today, title: title||'Untitled', body };

  if (existing >= 0) entries[existing] = entry;
  else entries.unshift(entry);
  save();
  updateEntryCount();
  unsaved = false;
  const btn = document.getElementById('save-btn');
  btn.textContent = '✓ Saved';
  btn.className = 'save-btn saved';
  setTimeout(()=>{ btn.textContent='✦ Save entry'; btn.className='save-btn'; }, 2000);
}

// ── ENTRIES ───────────────────────────
function renderEntries() {
  const list = document.getElementById('entries-list');
  const sub  = document.getElementById('entries-sub');
  if (!entries.length) {
    sub.textContent = 'No entries yet';
    list.innerHTML = '<div class="empty-journal"><div class="empty-journal-glyph">✦</div><p>Your journal is empty.<br>Start writing on the Write tab.</p></div>';
    return;
  }
  sub.textContent = entries.length + ' entr' + (entries.length===1?'y':'ies') + ' · ' + totalWords() + ' words total';
  list.innerHTML = entries.map(e=>`
    <div class="entry-card" onclick="openModal(${e.id})">
      <div>
        <div class="entry-card-title">${escHtml(e.title)}</div>
        <div class="entry-card-preview">${escHtml(e.body.slice(0,140))}${e.body.length>140?'…':''}</div>
        <span class="entry-card-words">${wordCount(e.body+' '+e.title)} words</span>
      </div>
      <div class="entry-card-meta">${fmtShort(e.date)}</div>
    </div>`).join('');
}

function totalWords() {
  return entries.reduce((a,e)=>a+wordCount(e.body+' '+e.title),0);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function openModal(id) {
  const e = entries.find(x=>x.id===id);
  if (!e) return;
  currentModalId = id;
  document.getElementById('modal-date').textContent = fmtDate(e.date).toUpperCase();
  document.getElementById('modal-title').textContent = e.title;
  document.getElementById('modal-body').textContent  = e.body;
  document.getElementById('modal-del-btn').onclick = ()=>deleteEntry(id);
  document.getElementById('entry-modal').style.display = 'flex';
}

function closeModal(ev) {
  if (ev.target.id==='entry-modal') document.getElementById('entry-modal').style.display='none';
}

function deleteEntry(id) {
  if (!confirm('Delete this entry?')) return;
  entries = entries.filter(e=>e.id!==id);
  save();
  updateEntryCount();
  document.getElementById('entry-modal').style.display='none';
  renderEntries();
}

// ── INSIGHTS ──────────────────────────
function renderInsights() {
  // Stats
  const statsRow = document.getElementById('stats-row');
  const n = entries.length;
  const tw = totalWords();
  const streak = calcStreak();
  statsRow.innerHTML = `
    <div class="stat-card"><div class="stat-label">Entries</div><div class="stat-value">${n}<span class="stat-unit"> total</span></div></div>
    <div class="stat-card"><div class="stat-label">Words</div><div class="stat-value">${tw.toLocaleString('en-IN')}<span class="stat-unit"> written</span></div></div>
    <div class="stat-card"><div class="stat-label">Streak</div><div class="stat-value">${streak}<span class="stat-unit"> day${streak!==1?'s':''}</span></div></div>`;

  // Activity bars
  const moodTl = document.getElementById('mood-timeline');
  const bars   = document.getElementById('mood-bars');
  if (n > 0) {
    moodTl.style.display = '';
    const days = [];
    for (let i=6;i>=0;i--) {
      const d = new Date(); d.setDate(d.getDate()-i);
      const iso = d.toISOString().split('T')[0];
      const e = entries.find(x=>x.date===iso);
      days.push({ label: SHORT_D[d.getDay()], words: e ? wordCount(e.body+' '+e.title) : 0 });
    }
    const maxW = Math.max(...days.map(d=>d.words), 1);
    bars.innerHTML = days.map(d=>{
      const h = Math.max(3, Math.round((d.words/maxW)*52));
      return `<div class="mood-bar-col">
        <div class="mood-bar" style="height:${h}px;background:${d.words>0?'var(--accent)':'var(--paper3)'};" title="${d.words} words"></div>
        <span class="mood-bar-day">${d.label}</span>
      </div>`;
    }).join('');
  } else {
    moodTl.style.display = 'none';
  }

  const sub = document.getElementById('insight-trigger-sub');
  if (n < 2) {
    sub.textContent = 'Write at least 2 entries to unlock AI insights';
    document.getElementById('insight-btn').disabled = true;
  } else {
    sub.textContent = `Analyse your ${Math.min(n,10)} most recent entries`;
    document.getElementById('insight-btn').disabled = false;
  }
}

function calcStreak() {
  if (!entries.length) return 0;
  const dates = new Set(entries.map(e=>e.date));
  let streak = 0, d = new Date();
  while (true) {
    const iso = d.toISOString().split('T')[0];
    if (dates.has(iso)) { streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  return streak;
}

async function runInsights() {
  const btn = document.getElementById('insight-btn');
  const out  = document.getElementById('insight-output');
  btn.disabled = true;
  btn.textContent = 'Thinking…';

  const recent = entries.slice(0, 10);
  const corpus = recent.map((e,i)=>
    `Entry ${i+1} (${fmtDate(e.date)})\nTitle: ${e.title}\n${e.body}`
  ).join('\n\n---\n\n');

  out.innerHTML = `<div class="insight-result">
    <div class="insight-result-header"><span class="insight-dot"></span> Reading your entries</div>
    <div class="insight-text"><span class="loading-dots"><span></span><span></span><span></span></span></div>
  </div>`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:`You are a warm, perceptive journal companion. You read someone's private journal entries and surface 3–5 specific, meaningful patterns or insights they might not have noticed themselves. 

Rules:
- Be specific — reference actual words, themes, or phrases from their entries. Never be generic.
- Be compassionate and non-judgmental. This is a safe space.
- Use "you" not "the writer".
- Format: start each insight on a new line with "✦ " prefix. Keep each insight to 2–3 sentences.
- End with one gentle, open-ended question for them to sit with.
- Do NOT use markdown bold or headers. Plain text only.`,
        messages:[{ role:'user', content:`Here are my recent journal entries:\n\n${corpus}\n\nWhat patterns or insights do you notice?` }]
      })
    });

    const data = await res.json();
    const text = data.content?.[0]?.text || 'Could not generate insights. Please try again.';

    out.innerHTML = `<div class="insight-result">
      <div class="insight-result-header"><span class="insight-dot"></span> AI reflection · ${new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</div>
      <div class="insight-text">${escHtml(text)}</div>
    </div>`;
  } catch(err) {
    out.innerHTML = `<div class="insight-result">
      <div class="insight-result-header"><span class="insight-dot"></span> Error</div>
      <div class="insight-text">Something went wrong. Please check your connection and try again.</div>
    </div>`;
  }

  btn.disabled = false;
  btn.textContent = 'Reflect again →';
}
</script>
</body>
</html>
